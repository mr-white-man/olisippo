backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: blog
    label: Thoughts
    folder: content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: Summary, name: summary, widget: text }
      - { label: Author, name: author, widget: string }
      - { label: Tags, name: tags, widget: list, allow_add: true }
      - { label: Body, name: body, widget: markdown }

  - name: projects
    label: Projects
    folder: content/projects
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - { label: Tags, name: tags, widget: list, allow_add: true }
      - { label: GitHub URL, name: github, widget: string, required: false }
      - { label: Live URL, name: liveUrl, widget: string, required: false }
      - { label: Image, name: image, widget: image, required: false }
      - { label: Body, name: body, widget: markdown }

  - name: studies
    label: Case Studies
    folder: content/studies
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Subtitle, name: subtitle, widget: string }
      - { label: Date, name: date, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: Tags, name: tags, widget: list, allow_add: true }
      - { label: Outcomes, name: outcomes, widget: list, allow_add: true }
      - { label: Body, name: body, widget: markdown }

  - name: jobs
    label: Work Experience
    folder: content/jobs
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: Job Title, name: jobTitle, widget: string }
      - { label: Company, name: company, widget: string }
      - { label: Location, name: location, widget: string }
      - { label: Start Date, name: startDate, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: End Date, name: endDate, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: Summary, name: summary, widget: text }
      - { label: Tags, name: tags, widget: list, allow_add: true }
      - { label: Body, name: body, widget: markdown }

  - name: education
    label: Education
    folder: content/education
    create: true
    slug: "{{slug}}"
    extension: md
    fields:
      - { label: School, name: school, widget: string }
      - { label: Summary, name: summary, widget: text }
      - { label: Start Date, name: startDate, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: End Date, name: endDate, widget: datetime, format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: Tags, name: tags, widget: list, allow_add: true }
      - { label: Body, name: body, widget: markdown }
